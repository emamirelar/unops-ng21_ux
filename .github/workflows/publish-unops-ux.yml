# Publishes the @emamirelar/ux Angular library to GitHub Packages when a version tag is pushed.
name: Publish @emamirelar/ux

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  registry-url: 'https://npm.pkg.github.com'
                  scope: '@emamirelar'

            - name: Install dependencies
              run: npm install --no-audit

            - name: Build library
              run: npm run build:lib

            - name: Publish to GitHub Packages
              working-directory: dist/unops-ux
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
